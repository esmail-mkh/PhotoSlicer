name: Build & Release PhotoSlicer

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create Draft Release on GitHub'
        type: boolean
        required: true
        default: true
      version_tag:
        description: 'Release Tag Version (e.g. v5.1)'
        type: string
        required: false
        default: 'v5.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Prepare Release Variables
        shell: powershell
        run: |
          $rawTag = "${{ inputs.version_tag }}"
          if (-not $rawTag) { $rawTag = "v5.1" }
          $cleanVer = $rawTag.TrimStart("vV")
          $relTitle = "Version $cleanVer"
          Write-Host "Clean Version: $cleanVer, Release Title: $relTitle"
          Add-Content -Path $env:GITHUB_ENV -Value "CLEAN_VERSION=$cleanVer"
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_TITLE=$relTitle"

      - name: Build Executable with PyInstaller
        shell: powershell
        run: |
          $tag = "${{ inputs.version_tag }}"
          if (-not $tag) { $tag = "v5.1" }
          $exeName = "PhotoSlicer $tag"

          Write-Host "Building EXE: $exeName"
          pyinstaller --noconfirm --onefile --windowed --icon "assets/icon.ico" --name "$exeName" --clean --splash "splash.png" --collect-all pillow_heif --add-data "assets;assets/" --add-data "engine.py;." main.py

      - name: Package Executable and up-model into ZIP
        shell: powershell
        run: |
          $tag = "${{ inputs.version_tag }}"
          if (-not $tag) { $tag = "v5.1" }
          $zipName = "PhotoSlicer-$tag.zip"
          
          Write-Host "Packaging $zipName..."
          New-Item -ItemType Directory -Path "dist_pkg" -Force
          Copy-Item -Path "dist\*.exe" -Destination "dist_pkg\"
          Copy-Item -Path "up-model" -Destination "dist_pkg\up-model" -Recurse -Force
          
          # Exclude non-Windows binaries from the Windows zip package
          Remove-Item -Path "dist_pkg\up-model\realesrgan-ncnn-vulkan-ubuntu" -ErrorAction SilentlyContinue
          Remove-Item -Path "dist_pkg\up-model\realesrgan-ncnn-vulkan-macos" -ErrorAction SilentlyContinue
          
          Compress-Archive -Path "dist_pkg\*" -DestinationPath $zipName -Force
          Write-Host "Package created: $zipName"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSlicer-Build
          path: PhotoSlicer-*.zip

      - name: Create Draft GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ inputs.version_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_TITLE }}
          files: PhotoSlicer-*.zip
          body: |
            [🇮🇷 **فارسی**](#-فوتو-اسلایسر-نسخه-${{ env.CLEAN_VERSION }}) | [🇬🇧 **English**](#-photoslicer-v${{ env.CLEAN_VERSION }})

            ---

            <div dir="rtl">

            # 🚀 فوتو اسلایسر نسخه ${{ env.CLEAN_VERSION }}: [عنوان تغییرات]

            **نسخه ${{ env.CLEAN_VERSION }} منتشر شد!** [توضیحات خلاصه این نسخه]

            ### 🌟 تغییرات جدید (نسخه ${{ env.CLEAN_VERSION }})

            * **✨ ویژگی جدید ۱:** توضیحات تغییرات...
            * **🔧 رفع باگ:** توضیحات رفع باگ...

            ---

            ### 📥 دانلود و نصب

            فایل **ZIP** آخرین نسخه را از صفحه [Release](https://github.com/esmail-mkh/PhotoSlicer/releases/latest) دانلود کنید، اکسترکت کنید و `PhotoSlicer.exe` را اجرا کنید. لذت ببرید!

            </div>

            ---

            # 🚀 PhotoSlicer v${{ env.CLEAN_VERSION }}: [Release Title]

            **Version ${{ env.CLEAN_VERSION }} is here!** [Short summary of the version]

            ### 🌟 What's New (v${{ env.CLEAN_VERSION }})

            * **✨ Feature 1:** Description of feature...
            * **🔧 Bug Fix:** Description of bug fix...

            ---

            ### 📥 Installation

            Download the latest **ZIP** file from the [Release page](https://github.com/esmail-mkh/PhotoSlicer/releases/latest), extract it, and run `PhotoSlicer.exe`. Enjoy!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

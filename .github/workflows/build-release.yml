name: Build & Release PhotoSlicer

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create Draft Release on GitHub'
        type: boolean
        required: true
        default: true
      version_tag:
        description: 'Release Tag Version (e.g. v5.1)'
        type: string
        required: false
        default: 'v5.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable with PyInstaller
        shell: powershell
        run: |
          $tag = "${{ inputs.version_tag }}"
          if (-not $tag) { $tag = "v5.1" }
          $exeName = "PhotoSlicer $tag"

          Write-Host "Building EXE: $exeName"
          pyinstaller --noconfirm --onefile --windowed `
            --icon "assets/icon.ico" `
            --name "$exeName" `
            --clean `
            --splash "splash.png" `
            --add-data "assets;assets/" `
            --add-data "engine.py;." `
            main.py

      - name: Package Executable and up-model into ZIP
        shell: powershell
        run: |
          $tag = "${{ inputs.version_tag }}"
          if (-not $tag) { $tag = "v5.1" }
          $zipName = "PhotoSlicer-$tag.zip"
          
          Write-Host "Packaging $zipName..."
          New-Item -ItemType Directory -Path "dist_pkg" -Force
          Copy-Item -Path "dist\*.exe" -Destination "dist_pkg\"
          Copy-Item -Path "up-model" -Destination "dist_pkg\up-model" -Recurse -Force
          
          Compress-Archive -Path "dist_pkg\*" -DestinationPath $zipName -Force
          Write-Host "Package created: $zipName"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSlicer-Build
          path: PhotoSlicer-*.zip

      - name: Create Draft GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ inputs.version_tag }}
          name: "PhotoSlicer ${{ inputs.version_tag }}"
          files: PhotoSlicer-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
